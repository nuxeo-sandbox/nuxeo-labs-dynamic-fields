<!--
`nuxeo-customschemadef-view-layout`
@group Nuxeo UI
@element nuxeo-customschemadef-view-layout
-->
<dom-module id="nuxeo-customschemadef-view-layout">
  <template>
    <style include="nuxeo-styles">
      nuxeo-data-table {
        height: 400px;
      }
    </style>

    <nuxeo-input
      role="widget"
      label="Customer ID"
      name="customerId"
      value="[[document.properties.csd:customerId]]"
      readonly
    ></nuxeo-input>

    <nuxeo-input
      role="widget"
      label="Type Name"
      name="defForTyp"
      value="[[document.properties.csd:defForTyp]]"
      readonly
    ></nuxeo-input>

    <nuxeo-data-table
      role="widget"
      label="Field Definitions"
      items="[[document.properties.csd:definition]]"
      name="definition"
    >
      <nuxeo-data-table-column name="Field Name">
        <template>[[item.fieldName]]</template>
      </nuxeo-data-table-column>

      <nuxeo-data-table-column name="Field Type">
        <template>
          <nuxeo-directory-suggestion role="widget" value="[[item.fieldTyp]]" label="" readonly="true" directory-name="dynf_field_types" name="fieldTyp"></nuxeo-directory-suggestion>
        </template>
      </nuxeo-data-table-column>
    </nuxeo-data-table>

  </template>

  <script>
    Polymer({
      is: 'nuxeo-customschemadef-view-layout',
      behaviors: [Nuxeo.LayoutBehavior],
      properties: {
        /**
         * @doctype CustomSchemaDef
         */
        document: {
          type: Object,
        },
      },
    });
  </script>
</dom-module>
