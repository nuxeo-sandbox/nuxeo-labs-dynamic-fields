<!--
`nuxeo-customschemadef-metadata-layout`
@group Nuxeo UI
@element nuxeo-customschemadef-metadata-layout
-->
<dom-module id="nuxeo-customschemadef-metadata-layout">
  <template>
    <style include="nuxeo-styles"></style>
    <!-- No preview needed for this document type -->
  </template>

  <script>
    Polymer({
      is: 'nuxeo-customschemadef-metadata-layout',
      behaviors: [Nuxeo.LayoutBehavior],
      properties: {
        /**
         * @doctype CustomSchemaDef
         */
        document: {
          type: Object,
        },
      },
    });
  </script>
</dom-module>
